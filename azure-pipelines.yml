  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: 'ProductionDeploy'
    steps:
      - download: current
        artifact: drop
      - task: PowerShell@2
        inputs:
          targetType: 'inline'
          script: |
            $asciiArt = @"            
            88888888ba   88888888ba     ,ad8888ba,    88888888ba,       88888888ba,    88888888888  88888888ba   88           ,ad8888ba,  8b        d8  
            88      "8b  88      "8b   d8"'    `"8b   88      `"8b      88      `"8b   88           88      "8b  88          d8"'    `"8b  Y8,    ,8P   
            88      ,8P  88      ,8P  d8'        `8b  88        `8b     88        `8b  88           88      ,8P  88         d8'        `8b  Y8,  ,8P    
