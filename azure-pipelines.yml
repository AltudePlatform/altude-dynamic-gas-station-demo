            88           88     `8b    Y8a.    .a8P   88      .a8P      88      .a8P   88           88           88          Y8a.    .a8P      88       
            88           88      `8b    `"Y8888Y"'    88888888Y"'       88888888Y"'    88888888888  88           88888888888  `"Y8888Y"'       88       
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
                                                                                                                                                        
            88           ,ad8888ba,  888888888888  88b           d88                                                                                    
            88          d8"'    `"8b      88       888b         d888                                                                                    
            88         d8'                88       88`8b       d8'88                                                                                    
            88         88                 88       88 `8b     d8' 88                                                                                    
            88         88      88888      88       88  `8b   d8'  88                                                                                    
            88         Y8,        88      88       88   `8b d8'   88                                                                                    
            88          Y8a.    .a88      88       88    `888'    88                                                                                    
            88888888888  `"Y88888P"       88       88     `8'     88 
            "@
            Write-Host $asciiArt

      - task: AzureCLI@2
        displayName: 'Upload files to Azure Blob Storage for website'
        inputs:
          azureSubscription: '7decefb2-701f-4033-a647-cc3f6a3fdf6e' # Replace with your Azure service connection name
          scriptType: 'ps'  # Use PowerShell syntax
          scriptLocation: 'inlineScript'
          inlineScript: |
            $sourcePath = "$(Pipeline.Workspace)\drop\altude-public-website\browser"
            
            # Log in using the service principal
            az login --service-principal -u $(AZURE_CLIENT_ID) -p $(AZURE_CLIENT_SECRET) --tenant $(AZURE_TENANT_ID)
            
            # Upload files using az storage blob upload-batch
            az storage blob upload-batch --account-name altudepublicwebsite --destination '$web' --source $sourcePath --auth-mode login --overwrite

        env:
          AZURE_CLIENT_ID: $(azureServicePrincipalId)
          AZURE_CLIENT_SECRET: $(azureServicePrincipalKey)
          AZURE_TENANT_ID: $(azureTenantId)